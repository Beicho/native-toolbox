name: Build APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    # 使用 runner 预装 SDK,补装 API 37.0 平台(preview 许可自动接受)
    - name: Install Android platform 37.0
      run: |
        SDKMANAGER="$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager"
        yes | "$SDKMANAGER" --licenses > /dev/null || true
        yes | "$SDKMANAGER" "platforms;android-37.0" "build-tools;36.0.0" > /dev/null
        ls "$ANDROID_HOME/platforms/"
        ls "$ANDROID_HOME/platforms"/android-37*/package.xml || echo "NO package.xml"

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4

    - name: Build Debug APK
      run: |
        chmod +x gradlew
        ./gradlew assembleDebug --stacktrace

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: native-toolbox-debug
        path: app/build/outputs/apk/debug/*.apk
        retention-days: 7
