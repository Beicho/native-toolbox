name: Build APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Remove corrupted Android SDK
      run: |
        sudo rm -rf /usr/lib/android-sdk
        sudo rm -rf $ANDROID_HOME
        sudo rm -rf ~/.android

    - name: Setup Android SDK manually
      run: |
        mkdir -p $HOME/android-sdk/cmdline-tools
        cd $HOME/android-sdk/cmdline-tools
        wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
        unzip -q commandlinetools-linux-11076708_latest.zip
        mv cmdline-tools latest
        export ANDROID_HOME=$HOME/android-sdk
        export PATH=$ANDROID_HOME/cmdline-tools/latest/bin:$PATH
        yes | sdkmanager --licenses || true
        sdkmanager "platforms;android-37" "build-tools;36.0.0" "platform-tools"
        echo "ANDROID_HOME=$HOME/android-sdk" >> $GITHUB_ENV
        echo "$HOME/android-sdk/cmdline-tools/latest/bin" >> $GITHUB_PATH
        echo "$HOME/android-sdk/platform-tools" >> $GITHUB_PATH

    - name: Clean all Gradle caches
      run: |
        rm -rf ~/.gradle/caches/
        rm -rf ~/.gradle/wrapper/
        rm -rf ~/.gradle/daemon/
        rm -rf .gradle/
        rm -rf build/
        rm -rf app/build/

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        cache-disabled: true
        cache-read-only: true

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build Debug APK
      run: ./gradlew clean assembleDebug --no-daemon --stacktrace --refresh-dependencies

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: native-toolbox-debug
        path: app/build/outputs/apk/debug/*.apk
        retention-days: 7
