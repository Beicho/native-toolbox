name: Emulator Test

on:
  workflow_dispatch:

jobs:
  emutest:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Enable KVM
      run: |
        echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
        sudo udevadm control --reload-rules
        sudo udevadm trigger --name-match=kvm

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Install Android platform 37.0
      run: |
        SDKMANAGER="$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager"
        yes | "$SDKMANAGER" --licenses > /dev/null || true
        yes | "$SDKMANAGER" "platforms;android-37.0" "build-tools;36.0.0" > /dev/null

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4

    - name: Build Debug APK
      run: |
        chmod +x gradlew
        ./gradlew assembleDebug --stacktrace

    # 释放 Gradle/Kotlin daemon 占用的几 GB 内存,防止模拟器被 OOM 杀掉
    - name: Stop Gradle daemons
      run: ./gradlew --stop || true

    - name: Run emulator tests
      uses: reactivecircus/android-emulator-runner@v2
      with:
        api-level: 35
        arch: x86_64
        target: google_apis
        profile: pixel_7
        emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
        disable-animations: true
        script: bash scripts/emutest-ci.sh

    - name: Upload screenshots
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: emutest-screenshots
        path: screenshots/
        retention-days: 7
